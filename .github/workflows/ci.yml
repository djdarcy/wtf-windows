name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # dazzlecmd-lib is not on PyPI yet (held per dazzlecmd's
        # no-release-during-Phase-4 policy). Install it from the
        # dazzlecmd monorepo's packages/dazzlecmd-lib/ subdirectory
        # via a tarball URL BEFORE pip-installing wtf.
        #
        # Tarball (not git+) URL is intentional: `pip install git+...`
        # triggers `git submodule update --init --recursive`, which on
        # the dazzlecmd monorepo tries to clone projects/wtf (pointing
        # back to THIS repo -- circular) and projects/core/listall.
        # The circular clone attempt auth-prompts and fails in CI
        # (fatal: could not read Username for 'https://github.com').
        # Tarball installs don't pull submodules, so the library alone
        # lands cleanly.
        #
        # Pinned to dazzlecmd commit 7546925 (v0.7.24) which ships the
        # package-mode runner fix wtf's python tools (locked,
        # restarted) require for relative-import dispatch.
        #
        # Once installed, wtf's dazzlecmd-lib>=0.1.0 constraint in
        # pyproject.toml is satisfied by the already-installed package,
        # so pip does not re-fetch from PyPI. Revert to standard
        # PyPI-only install once dazzlecmd-lib is published.
        pip install "dazzlecmd-lib @ https://github.com/DazzleTools/dazzlecmd/archive/7546925.tar.gz#subdirectory=packages/dazzlecmd-lib"
        pip install -e ".[dev]"

    - name: Install submodule tools
      run: |
        pip install -e tools/core/restarted

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 src/wtf_windows/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/wtf_windows/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Smoke tests
      run: |
        wtf --version
        wtf list
        wtf info restarted
        wtf mode status
        wtf restarted --version

    - name: Run tests
      run: |
        python -m pytest tests/ -v
      continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: 3.11

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        pip install twine
        twine check dist/*
